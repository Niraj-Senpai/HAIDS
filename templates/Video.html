  <script>
    let lastAlertId = 0;

    function playNotificationSound() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5); // A4

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }

    function fetchAlerts() {
        fetch('/get_latest_alert')
            .then(response => response.json())
            .then(data => {
                if (data.id && data.id !== lastAlertId) {
                    lastAlertId = data.id;
                    showAlert(data);
                }
            })
            .catch(err => console.error("Error fetching alerts:", err));
    }

    function showAlert(data) {
        const card = document.getElementById('alert-card');
        const img = document.getElementById('alert-image');
        const text = document.getElementById('alert-text');
        const title = document.getElementById('alert-title');

        title.innerText = data.module.toUpperCase() + " DETECTED";
        text.innerText = "Attention: A " + data.module.toLowerCase() + " incident has been identified.";
        img.src = data.image + "?t=" + new Date().getTime(); // Prevent caching

        card.classList.add('show');
        playNotificationSound();
    }

    function dismissAlert() {
        const card = document.getElementById('alert-card');
        card.classList.remove('show');
    }

    // Poll for alerts every 1.5 seconds
    setInterval(fetchAlerts, 1500);
  </script>
