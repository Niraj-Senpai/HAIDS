<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAIDS | Human Activity and Incident Detection System</title>
    <link rel="shortcut icon" href="{{url_for('static',filename='assets/images/haids-logo.png')}}" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{url_for('static',filename='assets/css/portal.css')}}">
    <style>
        .processing-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-top: 50px;
        }
        .video-box {
            position: relative;
            padding: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 500px;
        }
        .video-feed {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .status-badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 210, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }
        
        /* Alert Sidebar */
        .incident-panel {
            padding: 25px;
            height: fit-content;
        }
        .incident-list {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .incident-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            animation: slideInRight 0.4s ease-out;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Global Alert Modal (Glassmorphism) */
        #alert-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 450px;
            z-index: 5000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0;
            border-color: rgba(255, 0, 0, 0.4);
        }
        #alert-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
        }
        .alert-header {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            padding: 15px 25px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .alert-body {
            padding: 25px;
            text-align: center;
        }
        .alert-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body style="padding-top: 80px;">

    <nav style="position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 1000;" class="glass-panel">
        <a href="{{ url_for('Home') }}" style="text-decoration: none; display: flex; align-items: center;">
            <img src="{{url_for('static',filename='assets/images/haids-logo.png')}}" alt="HAIDS Logo" style="height: 40px; margin-right: 15px;">
            <span style="font-size: 1.5rem; font-weight: 700; color: white; letter-spacing: 1px;">HAIDS</span>
        </a>
        <div>
            <a href="{{ url_for('Portal') }}" style="color: var(--primary); margin-left: 30px; text-decoration: none; font-weight: 600;"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="{{ url_for('Home') }}" style="color: white; margin-left: 30px; text-decoration: none; font-weight: 600;">Home</a>
        </div>
    </nav>

    <div class="portal-container">
        <div class="processing-grid">
            <!-- Main Video Area -->
            <div class="video-box glass-panel">
                <div class="status-badge">
                    <div class="pulse"></div>
                    <span>AI LIVE ANALYSIS</span>
                </div>
                <img src="{{ url_for('video_feed') }}" class="video-feed">
            </div>

            <!-- Incident Feed sidebar -->
            <div class="incident-panel glass-panel">
                <h3 style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px;">
                    <i class="fas fa-stream" style="color: var(--primary); margin-right: 10px;"></i> Activity Log
                </h3>
                <div id="incident-list" class="incident-list">
                    <p id="no-incidents" style="color: var(--text-muted); font-size: 0.9rem;">Monitoring for incidents...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alert-modal" class="glass-panel">
        <div class="alert-header">
            <h3 style="margin: 0; font-size: 1.2rem; display: flex; align-items: center;">
                <i class="fas fa-exclamation-triangle" style="margin-right: 10px;"></i> CRITICAL ALERT
            </h3>
            <i class="fas fa-times" style="cursor: pointer;" onclick="dismissAlert()"></i>
        </div>
        <div class="alert-body">
            <img id="alert-image" src="" class="alert-img">
            <h2 id="alert-title" style="margin-bottom: 10px; color: #ff4b2b;">INCIDENT DETECTED</h2>
            <p id="alert-text" style="color: #ddd; margin-bottom: 25px; font-weight: 300;">Manual verification required immediately.</p>
            <button class="btn-start" style="background: #333; margin-top: 0; padding: 10px 30px;" onclick="dismissAlert()">Acknowledge</button>
        </div>
    </div>

    <script>
        let lastAlertId = 0;
        const incidentList = document.getElementById('incident-list');
        const noIncidents = document.getElementById('no-incidents');

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }

        function fetchAlerts() {
            fetch('/get_latest_alert')
                .then(response => response.json())
                .then(data => {
                    if (data.id && data.id !== lastAlertId) {
                        lastAlertId = data.id;
                        showAlert(data);
                        addIncidentToLog(data);
                    }
                })
                .catch(err => console.error("Error fetching alerts:", err));
        }

        function addIncidentToLog(data) {
            if (noIncidents) noIncidents.style.display = 'none';
            
            const card = document.createElement('div');
            card.className = 'incident-card';
            const time = new Date().toLocaleTimeString();
            card.innerHTML = `
                <div style="font-weight: 700; color: var(--primary); font-size: 0.9rem;">${data.module.toUpperCase()}</div>
                <div style="font-size: 0.8rem; color: #ddd; margin: 5px 0;">Incident reported and logged.</div>
                <div style="font-size: 0.7rem; color: var(--text-muted);">${time}</div>
            `;
            incidentList.prepend(card);
        }

        function showAlert(data) {
            const modal = document.getElementById('alert-modal');
            const img = document.getElementById('alert-image');
            const title = document.getElementById('alert-title');
            
            title.innerText = data.module.toUpperCase() + " DETECTED";
            img.src = data.image + "?t=" + new Date().getTime(); 

            modal.classList.add('show');
            playNotificationSound();
        }

        function dismissAlert() {
            document.getElementById('alert-modal').classList.remove('show');
        }

        setInterval(fetchAlerts, 1500);
    </script>
</body>
</html>
